<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">
    <div class="card">
      <div class="badge">Welcome</div>
      <h1 class="headline">
        Hello, <span class="gradient-text">World</span>
      </h1>
      <p class="subtext">
        A clean, modern starting point for your next big idea.
      </p>
      <div class="actions">
        <button class="btn btn-primary" id="animBtn">Get Started</button>
        <button class="btn btn-ghost" id="learnBtn">Learn More</button>
      </div>
      <div class="toast" id="toast"></div>
    </div>

    <div class="features">
      <div class="feature-card" data-delay="0">
        <div class="feature-icon">&#9889;</div>
        <h3>Fast</h3>
        <p>Zero dependencies. Pure HTML, CSS &amp; JS.</p>
      </div>
      <div class="feature-card" data-delay="100">
        <div class="feature-icon">&#127775;</div>
        <h3>Modern</h3>
        <p>Clean design with smooth animations.</p>
      </div>
      <div class="feature-card" data-delay="200">
        <div class="feature-icon">&#127760;</div>
        <h3>Responsive</h3>
        <p>Looks great on every screen size.</p>
      </div>
    </div>
  </main>

  <footer>
    <p>Built with <span class="heart">&#10084;</span> and no frameworks.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
